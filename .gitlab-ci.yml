# GitLab CI/CD Pipeline for Django E-commerce Application
# This pipeline handles testing, linting, and deployment workflows

stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POSTGRES_DB: "ecommerce_test"
  POSTGRES_USER: "ecom_user"
  POSTGRES_PASSWORD: "test_password"
  POSTGRES_HOST_AUTH_METHOD: "trust"

cache:
  paths:
    - .cache/pip
    - venv/

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt

# ============================================================================
# LINT STAGE
# ============================================================================

lint:python:
  stage: lint
  image: python:3.11
  script:
    - pip install flake8 black isort
    - echo "Running Black code formatter check..."
    - black --check . || true
    - echo "Running isort import formatter check..."
    - isort --check-only . || true
    - echo "Running Flake8 linter..."
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

lint:security:
  stage: lint
  image: python:3.11
  script:
    - pip install bandit
    - echo "Running security linter (Bandit)..."
    - bandit -r . -ll || true
  allow_failure: true
  only:
    - merge_requests
    - main
    - develop

# ============================================================================
# TEST STAGE
# ============================================================================

test:unit:
  stage: test
  image: python:3.11
  services:
    - postgres:13
  variables:
    DB_ENGINE: "django.db.backends.postgresql"
    DB_NAME: $POSTGRES_DB
    DB_USER: $POSTGRES_USER
    DB_PASSWORD: $POSTGRES_PASSWORD
    DB_HOST: "postgres"
    DB_PORT: "5432"
    SECRET_KEY: "test-secret-key"
    DEBUG: "0"
  script:
    - pip install -r requirements.txt
    - echo "Running Django migrations..."
    - python manage.py migrate
    - echo "Running unit tests..."
    - python manage.py test
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

test:migrations:
  stage: test
  image: python:3.11
  services:
    - postgres:13
  variables:
    DB_ENGINE: "django.db.backends.postgresql"
    DB_NAME: $POSTGRES_DB
    DB_USER: $POSTGRES_USER
    DB_PASSWORD: $POSTGRES_PASSWORD
    DB_HOST: "postgres"
    DB_PORT: "5432"
    SECRET_KEY: "test-secret-key"
    DEBUG: "0"
  script:
    - pip install -r requirements.txt
    - echo "Testing migrations forward and backward..."
    - python manage.py migrate
    - python manage.py migrate accounts zero
    - python manage.py migrate accounts
  only:
    - merge_requests
    - main
    - develop

test:static_files:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - echo "Collecting static files..."
    - python manage.py collectstatic --noinput --dry-run
  only:
    - merge_requests
    - main
    - develop

# ============================================================================
# BUILD STAGE
# ============================================================================

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  variables:
    REGISTRY: "registry.gitlab.com"
    IMAGE_TAG: "$REGISTRY/$CI_PROJECT_PATH:$CI_COMMIT_SHORT_SHA"
    LATEST_TAG: "$REGISTRY/$CI_PROJECT_PATH:latest"
  script:
    - echo "Building Docker image..."
    - docker build -t $IMAGE_TAG -t $LATEST_TAG .
    - echo "Docker image built successfully: $IMAGE_TAG"
  artifacts:
    reports:
      dotenv: build.env
  only:
    - main
    - develop
    - tags
  allow_failure: false

# ============================================================================
# DEPLOY STAGE
# ============================================================================

deploy:staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to staging environment..."
    - echo "Environment: Staging"
    - echo "Commit: $CI_COMMIT_SHA"
    - echo "Branch: $CI_COMMIT_REF_NAME"
    - |
      echo "Staging deployment steps:"
      echo "1. Run migrations on staging database"
      echo "2. Collect static files"
      echo "3. Restart application service"
      echo "4. Run smoke tests"
  environment:
    name: staging
    url: https://staging.ecommerce.example.com
    deployment_tier: staging
  only:
    - develop
  when: manual

deploy:production:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying to production environment..."
    - echo "Environment: Production"
    - echo "Commit: $CI_COMMIT_SHA"
    - echo "Tag: $CI_COMMIT_TAG"
    - |
      echo "Production deployment steps:"
      echo "1. Verify all tests passed"
      echo "2. Run database migrations"
      echo "3. Collect and verify static files"
      echo "4. Restart application service"
      echo "5. Verify health checks"
      echo "6. Monitor error logs"
  environment:
    name: production
    url: https://ecommerce.example.com
    deployment_tier: production
  only:
    - tags
    - main
  when: manual

# ============================================================================
# SCHEDULED JOBS
# ============================================================================

scheduled:database_backup:
  stage: deploy
  image: python:3.11
  script:
    - echo "Performing database backup..."
    - pip install -r requirements.txt
    - python manage.py dumpdata > backup_$(date +%Y%m%d_%H%M%S).json
    - echo "Database backup completed"
  only:
    - schedules
  allow_failure: true

scheduled:cleanup:
  stage: deploy
  image: python:3.11
  script:
    - echo "Running cleanup tasks..."
    - pip install -r requirements.txt
    - python manage.py clearsessions
    - echo "Session cleanup completed"
  only:
    - schedules
  allow_failure: true
