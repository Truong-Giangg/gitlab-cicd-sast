{% extends 'base.html' %}
{% block content %}
  <h1>Products</h1>
  <ul>
    {% for p in products %}
      <li>
        <a href="{{ p.get_absolute_url }}">{{ p.name }}</a> - ${{ p.price }}
        <form action="/cart/add/{{ p.slug }}/" method="post" style="display:inline">{% csrf_token %}<button type="submit">Add</button></form>
      </li>
    {% empty %}
      <li>No products yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
